# MRC 스트리밍 최적화 설정
# 딜레이를 최소화하기 위한 설정

# 낮은 딜레이 설정 (실시간 우선)
low_latency:
  quality: "low"           # low/med/high/auto
  resolution: "640x480"    # 낮은 해상도로 딜레이 감소
  framerate: 15           # 15 FPS
  bitrate: 1000000        # 1 Mbps
  buffer_size: 0          # 버퍼링 없음
  
  # MRC 파라미터
  params:
    holo: "true"          # 홀로그램 표시
    pv: "true"            # 실제 카메라
    mic: "false"          # 마이크 끄기 (딜레이 감소)
    loopback: "false"     # 시스템 오디오 끄기
    RenderFromCamera: "true"
    vstab: "false"        # 비디오 안정화 끄기
    vstabbuffer: "0"      # 안정화 버퍼 없음

# 표준 품질 (균형)
standard:
  quality: "med"
  resolution: "1280x720"
  framerate: 30
  bitrate: 3000000        # 3 Mbps
  
  params:
    holo: "true"
    pv: "true"
    mic: "true"
    RenderFromCamera: "true"
    vstab: "true"
    vstabbuffer: "15"

# 고품질 (녹화용)
high_quality:
  quality: "high"
  resolution: "1920x1080"
  framerate: 60
  bitrate: 8000000        # 8 Mbps
  
  params:
    holo: "true"
    pv: "true"
    mic: "true"
    loopback: "true"
    RenderFromCamera: "true"
    vstab: "true"
    vstabbuffer: "30"

# WebRTC 대안 (미래 구현용)
webrtc_settings:
  enabled: false
  stun_server: "stun:stun.l.google.com:19302"
  turn_server: null
  ice_servers: []