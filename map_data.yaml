# 작성일: 2025-08-21

map_info:
  version: "1.0"
  created: "2025-08-21T08:00:00"
  last_modified: "2025-08-21T08:45:30"
  grid_size: 5  # 5x5 격자
  scale: 100    # 1m = 100 pixels in map view
  coordinate_system: "ENU"  # East-North-Up (ROS2 표준)

# 로봇용 QR 코드
robot_qr_codes:
  Q1:
    id: "Q1"
    world_position: [0, 0, 0]  # 첫 QR이 원점 (x, y, z)
    map_position: [250, 250]   # 맵 중앙 (x, y pixels)
    robot_type: "xarm5"
    robot_base_offset:  # QR로부터 로봇 베이스까지 6D pose
      position: [0.5, 0, 0.3]  # x, y, z (미터)
      rotation: [0, 0, 0, 1]    # qx, qy, qz, qw
    robot_eef_offset:  # 로봇 베이스에서 End-Effector까지
      position: [0.6, 0, 0.5]  # xArm5 EEF 위치
      rotation: [0, 0, 0, 1]
    work_frame_offset:  # 로봇 베이스에서 작업 프레임까지  
      position: [0.8, 0, 0.1]  # 작업 테이블 위치
      rotation: [0, 0, 0, 1]
    
  Q2:
    id: "Q2"
    world_position: [2.5, 0, 1.8]
    map_position: [500, 430]   # 맵에서의 2D 위치
    robot_type: "iiwa14"
    robot_base_offset:
      position: [0.3, 0, 0.25]
      rotation: [0, 0.707, 0, 0.707]  # 90도 회전
    robot_eef_offset:  # IIWA14 EEF 위치
      position: [0.8, 0, 0.8]  
      rotation: [0, 0, 0, 1]
    work_frame_offset:
      position: [0.5, 0.3, 0.1]
      rotation: [0, 0, 0, 1]
    
  Q3:
    id: "Q3"
    world_position: [1.2, 0, 3.5]
    map_position: [370, 600]
    robot_type: "ur5"
    robot_base_offset:
      position: [0.4, 0, 0.2]
      rotation: [0, 0, 0, 1]
    robot_eef_offset:  # UR5 EEF 위치
      position: [0.85, 0, 0.6]
      rotation: [0, 0, 0, 1]
    work_frame_offset:
      position: [0.7, -0.2, 0.05]
