# ngrok 고정 도메인 설정
# 사용법: ngrok start --config=ngrok_config.yml flask-app

version: "2"
authtoken: YOUR_NGROK_AUTHTOKEN_HERE

tunnels:
  flask-app:
    proto: http
    addr: 5000
    # 유료 계정이면 고정 도메인 사용 가능:
    # hostname: your-custom-domain.ngrok.io
    # 무료 계정은 매번 랜덤 도메인
    
  # 개발용 추가 터널
  unity-debug:
    proto: http  
    addr: 8080